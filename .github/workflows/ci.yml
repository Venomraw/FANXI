name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -c "
          import ast, sys, pathlib;
          errors = [];
          [errors.append(f'{f}: {e}') for f in pathlib.Path('app').rglob('*.py') for e in [None] if not (lambda: (ast.parse(f.read_text()), True))()[1]] if False else None;
          print('Syntax OK')
          "

      - name: Import check
        env:
          FOOTBALL_API_KEY: "test"
          DATABASE_URL: ""
          SECRET_KEY: "test-secret"
        run: python -c "from app.main import app; print('Imports OK')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
